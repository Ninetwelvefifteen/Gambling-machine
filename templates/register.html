<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">

        <h1>Create Account</h1>

        <form action="/register" method="post">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <a href="/login">
            Already have an account?
        </a>

    </div>

</body>
</html>
